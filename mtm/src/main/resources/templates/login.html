<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Login</title>

    <link rel="stylesheet" href="/libs/bootstrap/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #111, #2c2c2c);
            min-height: 100vh;
        }

        .auth-wrapper {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .auth-title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
        }

        .btn-custom {
            background-color: #ff6600;
            color: white;
            border-radius: 25px;
        }

        .btn-custom:hover {
            background-color: #e65c00;
        }

        .error {
            color: #ff4d4d;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg" style="background-color:#111;">
    <div class="container">

        <a class="navbar-brand text-white" href="/">MTM</a>

        <div class="d-flex align-items-center gap-3 text-white">

            <!-- NO LOGUEADO -->
            <div sec:authorize="isAnonymous()">
                <a href="/login" class="text-white">Iniciar sesión</a>
                <a href="/registro" class="btn btn-warning btn-sm ms-2">Registrarse</a>
            </div>

            <!-- LOGUEADO -->
            <div sec:authorize="isAuthenticated()">


                <a sec:authorize="hasRole('ADMIN')"
                   href="/admin"
                   class="btn btn-warning btn-sm ms-2">
                    Admin
                </a>

                <a href="/logout" class="btn btn-outline-light btn-sm ms-2">
                    Logout
                </a>

            </div>

        </div>

    </div>
</nav>

<!-- MENSAJE -->
<div th:if="${param.success}" class="text-success text-center mt-3">
    Registro exitoso, ahora inicia sesión
</div>

<!-- FORM -->
<div class="auth-wrapper">
    <div class="auth-card">

        <h3 class="auth-title">Iniciar sesión</h3>

        <div th:if="${param.error}" class="error">
            Credenciales incorrectas
        </div>

        <form method="post" action="/login">
            <input class="form-control mb-3" name="email" placeholder="Correo electrónico" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Contraseña" required>

            <button class="btn btn-custom w-100">Entrar</button>
        </form>

        <div class="text-center mt-3">
            <a href="/registro">Crear cuenta</a>
        </div>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
         font-family: 'Poppins', sans-serif;
         background: linear-gradient(135deg, #111, #2c2c2c);
         min-height: 100vh;
       }

     /* PARA QUE EL NAVBAR NO SE PIERDA */
     .auth-wrapper {
         min-height: calc(100vh - 80px);
         display: flex;
         align-items: center;
         justify-content: center;
     }

     /* CARD */
     .auth-card {
         background: white;
         padding: 40px;
         border-radius: 15px;
         width: 100%;
         max-width: 400px;
         box-shadow: 0 20px 50px rgba(0,0,0,0.3);
         animation: fadeIn 0.6s ease;
     }

     /* TITULO */
     .auth-title {
         text-align: center;
         font-weight: 600;
         margin-bottom: 20px;
     }

     /* INPUTS */
     .form-control {
         border-radius: 10px;
         padding: 10px;
     }

     /* BOTON */
     .btn-custom {
         background-color: #ff6600;
         color: white;
         border-radius: 25px;
     }

     .btn-custom:hover {
         background-color: #e65c00;
     }

     /* LINKS */
     a {
         color: #ff6600;
         text-decoration: none;
     }

     a:hover {
         text-decoration: underline;
     }

     /* ERROR */
     .error {
         color: #ff4d4d;
         text-align: center;
         margin-bottom: 10px;
     }

     /* ANIMACION */
     @keyframes fadeIn {
         from {
             opacity: 0;
             transform: translateY(20px);
         }
         to {
             opacity: 1;
             transform: translateY(0);
         }
     }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg" style="background-color:#111;">
    <div class="container">

        <a class="navbar-brand text-white" href="/">MTM</a>


        <div class="d-flex align-items-center gap-3">

            <div th:if="${usuarioSesion == null}">
                <a href="/login" class="text-white">Iniciar sesión</a>
                <a href="/registro" class="btn btn-warning btn-sm ms-2">Registrarse</a>
            </div>

            <div th:if="${usuarioSesion != null}" class="text-white">
                Hola, <b th:text="${usuarioSesion.nombre}"></b>

                <a th:if="${usuarioSesion.rol.nombre == 'ADMIN'}"
                   href="/admin"
                   class="btn btn-warning btn-sm ms-2">Admin</a>

                <a href="/logout" class="btn btn-outline-light btn-sm ms-2">Logout</a>
            </div>

        </div>
    </div>
</nav>

<div th:if="${error}" class="error">
    <span th:text="${error}"></span>
</div>

<!-- FORM -->
<div class="auth-wrapper">
    <div class="auth-card">

        <h3 class="auth-title">Crear cuenta</h3>

        <form method="post" action="/registro">
            <input class="form-control mb-3" name="nombre" placeholder="Nombre completo" required>
            <input class="form-control mb-3" name="email" placeholder="Correo electrónico" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Contraseña" required>

            <button class="btn btn-custom w-100">Registrarse</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login">¿Ya tienes cuenta? Inicia sesión</a>
        </div>

    </div>
</div>

</body>
</html>

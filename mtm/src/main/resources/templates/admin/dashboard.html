<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="/libs/bootstrap/css/bootstrap.min.css">

    <script src="/libs/apexcharts/apexcharts.min.js"></script>

    <meta http-equiv="Cache-Control"
          content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Pragma"
          content="no-cache">

    <meta http-equiv="Expires"
          content="0">

    <style>

        body {
            background: #f5f5f5;
            overflow-x: hidden;
        }

        .navbar {
            background: #111;
        }

        .sidebar {

            min-height: calc(100vh - 70px);

            background: #111;

            color: white;

            padding: 25px;
        }

        .sidebar a {

            display: block;

            color: white;

            text-decoration: none;

            padding: 12px;

            border-radius: 10px;

            margin-bottom: 10px;

            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #ff6600;
        }

        .content {
            padding: 30px;
        }

        .card-dashboard {

            border: none;

            border-radius: 15px;

            padding: 25px;

            color: white;

            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .bg-sales {
            background: linear-gradient(135deg, #ff6600, #ff944d);
        }

        .bg-orders {
            background: linear-gradient(135deg, #007bff, #3399ff);
        }

        .bg-products {
            background: linear-gradient(135deg, #28a745, #5dd879);
        }

        .chart-card {

            background: white;

            border-radius: 15px;

            padding: 25px;

            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">

    <div class="container-fluid px-4">

        <a class="navbar-brand text-white"
           href="/">

            MTM

        </a>

        <!-- BUSCADOR -->
        <form class="d-flex mx-auto"
              method="get"
              action="/">

            <input class="form-control me-2"
                   type="search"
                   name="search"
                   placeholder="Buscar productos...">

            <button class="btn btn-warning">
                Buscar
            </button>

        </form>

        <!-- USER -->
        <div class="d-flex align-items-center gap-3 text-white">

            <div sec:authorize="isAuthenticated()">



                <a href="/admin"
                   class="btn btn-warning btn-sm ms-2">

                    Admin

                </a>

                <a href="/carrito"
                   class="btn btn-warning btn-sm">

                    Carrito

                </a>

                <a href="/mis-ordenes"
                   class="btn btn-outline-light btn-sm">

                    Mis compras

                </a>

                <a href="/logout"
                   class="btn btn-outline-light btn-sm">

                    Logout

                </a>

            </div>

        </div>

    </div>

</nav>

<!-- MAIN -->
<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">

            <h4 class="mb-4">Admin</h4>

            <a href="/admin">Dashboard</a>

            <a href="/admin/materiales">
                Materiales
            </a>

            <a href="/admin/acabados">
                Acabados
            </a>

            <a href="/admin/patas">
                Patas
            </a>

            <a href="/admin/productos">
                Productos
            </a>

            <hr>

            <a href="/">
                Volver a tienda
            </a>

        </div>

        <!-- CONTENT -->
        <div class="col-md-10 content">

            <h2 class="mb-4">

                Bienvenido Administrador

            </h2>

            <!-- CARDS -->
            <div class="row mb-4">

                <!-- TOTAL VENTAS -->
                <div class="col-md-4 mb-3">

                    <div class="card-dashboard bg-sales">

                        <h5>Total Ventas</h5>

                        <h2>
                            $
                            <span th:text="${totalVentas}"></span>
                        </h2>

                    </div>

                </div>

                <!-- TOTAL ORDENES -->
                <div class="col-md-4 mb-3">

                    <div class="card-dashboard bg-orders">

                        <h5>Total Órdenes</h5>

                        <h2 th:text="${totalOrdenes}"></h2>

                    </div>

                </div>

                <!-- PRODUCTOS -->
                <div class="col-md-4 mb-3">

                    <div class="card-dashboard bg-products">

                        <h5>Productos Vendidos</h5>

                        <h2 th:text="${productosVendidos}"></h2>

                    </div>

                </div>

            </div>

            <!-- GRAFICA -->
            <div class="chart-card">

                <h4 class="mb-4">

                    Productos más vendidos

                </h4>
                <div class="mb-4">

                    <select id="chartSelector"
                            class="form-select w-auto">

                        <option value="productos">
                            Productos más vendidos
                        </option>

                        <option value="ordenes">
                            Órdenes por estado
                        </option>

                    </select>

                </div>

                <div id="ventasChart"></div>

            </div>

        </div>

    </div>

</div>
<script th:inline="javascript">

    // ==========================
    // DATOS THYMELEAF
    // ==========================
    let productos = [[${productosLabels}]];
    let cantidades = [[${productosData}]];

    let estados = [[${estadosLabels}]];
    let estadosCantidad = [[${estadosData}]];

    // ==========================
    // CONFIG INICIAL
    // ==========================
   var options = {

        chart: {
            type: 'bar',
            height: 400
        },

        theme: {
            mode: 'light'
        },

        dataLabels: {
            style: {
                colors: ['#000']
            }
        },

        xaxis: {
            categories: productos,

            labels: {
                style: {
                    colors: '#000'
                }
            }
        },

        yaxis: {
            labels: {
                style: {
                    colors: '#000'
                }
            }
        },

        legend: {
            labels: {
                colors: '#000'
            }
        },

        series: [{
            name: 'Ventas',
            data: cantidades
        }]
};

    var chart = new ApexCharts(
        document.querySelector("#ventasChart"),
        options
    );

    chart.render();

    // ==========================
    // FILTRO
    // ==========================
    document
        .getElementById("chartSelector")

        .addEventListener("change", function () {

            let value = this.value;

            // ==========================
            // PRODUCTOS
            // ==========================
            if (value === "productos") {

                chart.updateOptions({

                    chart: {
                        type: 'bar'
                    },

                    series: [{
                        name: 'Ventas',
                        data: cantidades
                    }],

                    xaxis: {
                        categories: productos
                    }

                });

            }

            // ==========================
            // ORDENES
            // ==========================
            if (value === "ordenes") {

                chart.updateOptions({

                    chart: {
                        type: 'donut'
                    },

                    series: estadosCantidad,

                    labels: estados

                });

            }

        });

</script>

</body>
</html>

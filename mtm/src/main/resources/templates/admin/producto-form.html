<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Producto</title>

    <link rel="stylesheet" href="/libs/bootstrap/css/bootstrap.min.css">

    <style>

        body {
            background: #f5f5f5;
        }

        .content {
            padding: 40px;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            max-width: 700px;
            margin: auto;
        }

        .btn-custom {
            background: #ff6600;
            color: white;
        }

    </style>
</head>

<body>

<div class="container content">

    <div class="form-box">

        <h3 th:text="${producto.idProducto == null ? 'Nuevo Producto' : 'Editar Producto'}"></h3>

        <form th:action="@{/admin/productos/guardar}"
              method="post"
              th:object="${producto}">

            <!-- ID -->

            <input type="hidden"
                   th:field="*{idProducto}">


            <!-- =====================================
                 NOMBRE
            ====================================== -->

            <label class="mt-3">
                Nombre
            </label>

            <input class="form-control"
                   th:field="*{nombre}"
                   required>


            <!-- =====================================
                 DESCRIPCION
            ====================================== -->

            <label class="mt-3">
                Descripción
            </label>

            <textarea class="form-control"
                      th:field="*{descripcion}"
                      rows="4"></textarea>


            <!-- =====================================
                 PRECIO
            ====================================== -->

            <label class="mt-3">
                Precio Base
            </label>

            <input type="number"
                   step="0.01"
                   class="form-control"
                   th:field="*{precioBase}"
                   required>


            <!-- =====================================
                 CATEGORIA
            ====================================== -->

            <label class="mt-3">
                Categoría
            </label>

            <input class="form-control"
                   th:field="*{categoria}"
                   required>


            <!-- =====================================
                 IMAGEN
            ====================================== -->

            <label class="mt-3">
                Imagen URL
            </label>

            <input class="form-control"
                   th:field="*{imagenUrl}"
                   placeholder="https://...">


            <!-- =====================================
                 BASE 3D
            ====================================== -->

            <label class="mt-3">
                Base 3D
            </label>

            <input class="form-control"
                   th:field="*{base3d}"
                   placeholder="/models/mesa_normal/BaseMesaNogal.glb">

            <small class="text-muted">
                Ruta del modelo base .glb dentro de static/models
            </small>


            <!-- =====================================
                 PATAS 3D
            ====================================== -->

            <label class="mt-3">
                Patas 3D
            </label>

            <input class="form-control"
                   th:field="*{patas3d}"
                   placeholder="/models/mesa_normal/PatasMetalicas.glb">

            <small class="text-muted">
                Ruta del modelo de patas .glb dentro de static/models
            </small>


            <!-- =====================================
                 ACTIVO
            ====================================== -->

            <label class="mt-3">
                Activo
            </label>

            <select class="form-control"
                    th:field="*{activo}">

                <option th:value="true">
                    Sí
                </option>

                <option th:value="false">
                    No
                </option>

            </select>


            <!-- =====================================
                 BOTONES
            ====================================== -->

            <div class="mt-4 d-flex gap-2">

                <button class="btn btn-custom w-50">
                    Guardar
                </button>

                <a href="/admin/productos"
                   class="btn btn-secondary w-50">

                    Cancelar

                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>

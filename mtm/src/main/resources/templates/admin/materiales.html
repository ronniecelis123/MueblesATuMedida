<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Materiales</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f5f5; }

        .sidebar {
            height: calc(100vh - 70px);
            background: #111;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background: #ff6600;
        }

        .content {
            padding: 30px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .btn-custom {
            background: #ff6600;
            color: white;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg" style="background-color:#111;">
    <div class="container">

        <a class="navbar-brand text-white" href="/">MTM</a>

        <form class="d-flex mx-auto" method="get" action="/">
            <input class="form-control me-2" type="search" name="search" placeholder="Buscar productos...">
            <button class="btn btn-warning">Buscar</button>
        </form>

        <div class="d-flex align-items-center gap-3">

            <div th:if="${usuarioSesion == null}">
                <a href="/login" class="text-white">Iniciar sesión</a>
                <a href="/registro" class="btn btn-warning btn-sm ms-2">Registrarse</a>
            </div>

            <div th:if="${usuarioSesion != null}" class="text-white">
                Hola, <b th:text="${usuarioSesion.nombre}"></b>

                <a th:if="${usuarioSesion.rol.nombre == 'ADMIN'}"
                   href="/admin"
                   class="btn btn-warning btn-sm ms-2">
                    Admin
                </a>

                <a href="/logout" class="btn btn-outline-light btn-sm ms-2">
                    Logout
                </a>
            </div>

        </div>

    </div>
</nav>

<!-- LAYOUT -->
<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">

            <h4>Admin</h4>

            <a href="/admin">Dashboard</a>
            <a href="/admin/materiales">Materiales</a>
            <a href="/admin/acabados">Acabados</a>
            <a href="/admin/patas">Patas</a>

            <hr>

            <a href="/">Volver a tienda</a>

        </div>

        <!-- CONTENIDO -->
        <div class="col-md-10 content">

            <div class="box">

                <div class="d-flex justify-content-between mb-3">
                    <h3>Materiales</h3>

                    <a href="/admin/materiales/nuevo" class="btn btn-custom">
                        + Nuevo
                    </a>
                </div>

                <table class="table table-hover">

                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="m : ${materiales}">

                        <td th:text="${m.nombre}"></td>

                        <td>$<span th:text="${m.costoM2}"></span></td>

                        <td class="text-end">

                            <a th:href="@{'/admin/materiales/editar/' + ${m.idMaterial}}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a th:href="@{'/admin/materiales/eliminar/' + ${m.idMaterial}}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar?')">
                                Eliminar
                            </a>

                        </td>

                    </tr>
                    </tbody>

                </table>

            </div>

        </div>

    </div>
</div>

</body>
</html>

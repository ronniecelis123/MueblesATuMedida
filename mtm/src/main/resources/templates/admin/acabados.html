<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Acabados</title>


    <link rel="stylesheet" href="/libs/bootstrap/css/bootstrap.min.css">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        body { background: #f5f5f5; }

        .sidebar {
            height: calc(100vh - 70px);
            background: #111;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background: #ff6600;
        }

        .content {
            padding: 30px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .btn-custom {
            background: #ff6600;
            color: white;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg" style="background-color:#111;">
    <div class="container">

        <a class="navbar-brand text-white" href="/">MTM</a>

        <form class="d-flex mx-auto" method="get" action="/">
            <input class="form-control me-2" type="search" name="search" placeholder="Buscar productos...">
            <button class="btn btn-warning">Buscar</button>
        </form>

        <div class="d-flex align-items-center gap-3 text-white">

            <!-- NO LOGUEADO -->
            <div sec:authorize="isAnonymous()">
                <a href="/login" class="text-white">Iniciar sesión</a>
                <a href="/registro" class="btn btn-warning btn-sm ms-2">Registrarse</a>
            </div>

            <!-- LOGUEADO -->
            <div sec:authorize="isAuthenticated()">


                <a sec:authorize="hasRole('ADMIN')"
                   href="/admin"
                   class="btn btn-warning btn-sm ms-2">
                    Admin
                </a>

                <a href="/carrito" class="btn btn-warning btn-sm">
                     Carrito
                </a>
                <a href="/mis-ordenes"
                   class="btn btn-outline-light btn-sm">

                    Mis compras

                </a>
                <a href="/logout" class="btn btn-outline-light btn-sm ms-2">
                    Logout
                </a>

            </div>

        </div>

    </div>
</nav>

<!-- LAYOUT -->
<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>Admin</h4>

            <a href="/admin">Dashboard</a>
            <a href="/admin/materiales">Materiales</a>
            <a href="/admin/acabados">Acabados</a>
            <a href="/admin/patas">Patas</a>
            <a href="/admin/productos">Productos</a>

            <hr>

            <a href="/">Volver a tienda</a>
        </div>

        <!-- CONTENIDO -->
        <div class="col-md-10 content">

            <div class="box">

                <div class="d-flex justify-content-between mb-3">
                    <h3>Acabados</h3>

                    <a href="/admin/acabados/nuevo" class="btn btn-custom">
                        + Nuevo
                    </a>
                </div>

                <table class="table table-hover">

                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Factor</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="a : ${acabados}">

                        <td th:text="${a.nombre}"></td>

                        <td>
                            x<span th:text="${a.factorPrecio}"></span>
                        </td>

                        <td class="text-end">

                            <a th:href="@{'/admin/acabados/editar/' + ${a.idAcabado}}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a th:href="@{'/admin/acabados/eliminar/' + ${a.idAcabado}}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar?')">
                                Eliminar
                            </a>

                        </td>

                    </tr>
                    </tbody>

                </table>

            </div>

        </div>

    </div>
</div>

</body>
</html>

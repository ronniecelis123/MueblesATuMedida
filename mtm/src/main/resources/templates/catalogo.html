<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>MTM - Catálogo</title>

    <link rel="stylesheet" href="/libs/bootstrap/css/bootstrap.min.css"><
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: #111;
            padding: 15px 0;
        }

        .navbar-brand {
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .product-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .product-img {
            height: 220px;
            object-fit: cover;
        }

        .price {
            font-weight: 600;
            color: #111;
        }

        .btn-custom {
            background-color: #ff6600;
            color: white;
            border-radius: 25px;
        }

        .btn-custom:hover {
            background-color: #e65c00;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand text-white" href="/">MTM</a>

        <!-- BUSCADOR -->
        <form class="d-flex mx-auto" method="get" action="/">
            <input class="form-control me-2" type="search" name="search" placeholder="Buscar productos...">
            <button class="btn btn-warning">Buscar</button>
        </form>

        <!-- USUARIO -->
        <div class="d-flex align-items-center gap-3 text-white">

            <!-- NO AUTENTICADO -->
            <div sec:authorize="isAnonymous()">
                <a href="/login" class="text-white">Iniciar sesión</a>
                <a href="/registro" class="btn btn-warning btn-sm ms-2">Registrarse</a>
            </div>

            <!-- AUTENTICADO -->
            <div sec:authorize="isAuthenticated()">


                <a sec:authorize="hasRole('ADMIN')"
                   href="/admin"
                   class="btn btn-warning btn-sm ms-2">
                    Admin
                </a>
                <a href="/carrito" class="btn btn-warning btn-sm">
                     Carrito
                </a>
                <a href="/perfil"
                   class="btn btn-outline-light btn-sm">
                    Perfil
                </a>
                <a href="/mis-ordenes"
                   class="btn btn-outline-light btn-sm">

                    Mis compras

                </a>
                <a href="/logout" class="btn btn-outline-light btn-sm ms-2">
                    Logout
                </a>


            </div>

        </div>

    </div>
</nav>

<div class="container mt-3">

    <div th:if="${param.cuentaEliminada}"
         class="alert alert-warning">

        Tu cuenta fue eliminada correctamente.

    </div>
    <div th:if="${param.nombreActualizado}"
         class="alert alert-success">

        Tu nombre de usuario fue actualizado correctamente.

    </div>

</div>

<div class="container mt-4">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-3">
            <div class="bg-white p-3 rounded shadow-sm">
                <h5>Categorías</h5>

                <a href="/" class="btn btn-outline-secondary w-100 mb-2">Todos</a>
                <a href="/?categoria=Mesa" class="btn btn-outline-secondary w-100 mb-2">Mesas</a>
                <a href="/?categoria=Silla" class="btn btn-outline-secondary w-100 mb-2">Sillas</a>
            </div>
        </div>

        <!-- PRODUCTOS -->
        <div class="col-md-9">

            <h3 class="mb-4">Catálogo de Muebles</h3>

            <div class="row">

                <div class="col-md-4 mb-4" th:each="p : ${productos}">
                    <div class="card product-card">

                        <img th:src="${p.imagenUrl}" class="card-img-top product-img">

                        <div class="card-body">
                            <h6 th:text="${p.nombre}"></h6>

                            <p class="text-muted small" th:text="${p.descripcion}"></p>


                            <a th:href="@{'/configurar/' + ${p.idProducto}}">
                                <button class="btn btn-custom w-100">Personalizar</button>
                            </a>
                        </div>

                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MTM - Catálogo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }

        /* NAVBAR */
        .navbar {
            background-color: #111;
            padding: 15px 0;
        }

        .navbar-brand {
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .search-box {
            border-radius: 25px;
            padding: 8px 15px;
        }

        .btn-search {
            background-color: #ff6600;
            border-radius: 25px;
            color: white;
            padding: 8px 20px;
        }

        /* SIDEBAR */
        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .sidebar h5 {
            font-weight: 600;
            margin-bottom: 15px;
        }

        .filter-btn {
            border-radius: 20px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .filter-btn:hover {
            background-color: #111;
            color: white;
        }

        /* CARDS */
        .product-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s forwards;
        }

        .product-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .product-img {
            height: 220px;
            object-fit: cover;
        }

        .price {
            font-weight: 600;
            color: #111;
        }

        .btn-custom {
            background-color: #ff6600;
            color: white;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #e65c00;
        }

        /* ANIMACIONES */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* DELAY DINÁMICO */
        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
        .product-card:nth-child(4) { animation-delay: 0.4s; }
        .product-card:nth-child(5) { animation-delay: 0.5s; }
        .product-card:nth-child(6) { animation-delay: 0.6s; }

        .navbar a {
            font-size: 14px;
        }

        .navbar span {
            font-size: 14px;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg" style="background-color:#111;">
    <div class="container">

        <a class="navbar-brand text-white" href="/">MTM</a>

        <!-- BUSCADOR -->
        <form class="d-flex mx-auto" method="get" action="/">
            <input class="form-control me-2" type="search" name="search" placeholder="Buscar productos...">
            <button class="btn btn-warning">Buscar</button>
        </form>

        <!-- USUARIO -->
        <div class="d-flex align-items-center gap-3">

            <!-- NO LOGUEADO -->
            <div th:if="${usuarioSesion == null}">
                <a href="/login" class="text-white">Iniciar sesión</a>
                <a href="/registro" class="btn btn-warning btn-sm ms-2">Registrarse</a>
            </div>

            <!-- LOGUEADO -->
            <div th:if="${usuarioSesion != null}" class="text-white">

                Hola, <b th:text="${usuarioSesion.nombre}"></b>

                <a th:if="${usuarioSesion.rol.nombre == 'ADMIN'}"
                   href="/admin"
                   class="btn btn-warning btn-sm ms-2">
                    Admin
                </a>

                <a href="/logout" class="btn btn-outline-light btn-sm ms-2">
                    Logout
                </a>

            </div>

        </div>

    </div>
</nav>

<div class="container mt-4">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-3">

            <div class="sidebar">
                <h5>Categorías</h5>

                <a href="/" class="btn btn-outline-secondary w-100 filter-btn">Todos</a>
                <a href="/?categoria=Mesa" class="btn btn-outline-secondary w-100 filter-btn">Mesas</a>
                <a href="/?categoria=Silla" class="btn btn-outline-secondary w-100 filter-btn">Sillas</a>
                <a href="/?categoria=Closet" class="btn btn-outline-secondary w-100 filter-btn">Closets</a>
            </div>

        </div>

        <!-- PRODUCTOS -->
        <div class="col-md-9">

            <h3 class="mb-4">Catálogo de Muebles</h3>

            <div class="row">

                <div class="col-md-4 mb-4" th:each="p : ${productos}">
                    <div class="card product-card">

                        <img th:src="${p.imagenUrl}" class="card-img-top product-img">

                        <div class="card-body">
                            <h6 th:text="${p.nombre}"></h6>

                            <p class="text-muted small" th:text="${p.descripcion}"></p>

                            <p class="price">$<span th:text="${p.precioBase}"></span></p>

                            <a th:href="@{'/configurar/' + ${p.idProducto}}">
                                <button class="btn btn-custom w-100">Personalizar</button>
                            </a>
                        </div>

                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Comprobante</title>

    <link rel="stylesheet" href="/libs/bootstrap/css/bootstrap.min.css">

    <style>

        body {
            background: #f5f5f5;
        }

        .ticket {

            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;

            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .title {
            color: #ff6600;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="ticket">

        <div class="d-flex justify-content-between">

            <div>
                <h2 class="title">MTM Furniture</h2>
                <p>Comprobante de compra</p>
            </div>

            <div class="text-end">

                <strong>Orden #</strong>
                <span th:text="${orden.idOrden}"></span>

                <br>

                <strong>Fecha:</strong>
                <span th:text="${#dates.format(orden.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></span>

            </div>

        </div>

        <hr>

        <h5>Cliente</h5>

        <p th:text="${orden.usuario.nombre}"></p>

        <p th:text="${orden.usuario.email}"></p>

        <hr>

        <table class="table table-striped">

            <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Subtotal</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="d : ${orden.detalles}">

                <td th:text="${d.configuracion.producto.nombre}"></td>

                <td th:text="${d.cantidad}"></td>

                <td>
                    $<span th:text="${d.precioUnitario}"></span>
                </td>

                <td>
                    $<span th:text="${d.subtotal}"></span>
                </td>

            </tr>

            </tbody>

        </table>

        <div class="text-end mt-4">

            <h3>

                Total:
                $<span th:text="${orden.total}"></span>

            </h3>

        </div>

        <div class="mt-4 d-flex gap-2">

            <a href="/"
               class="btn btn-dark">

                Volver a tienda

            </a>

            <a href="/carrito"
               class="btn btn-outline-secondary">

                Ver carrito

            </a>
            <a th:href="@{'/orden/pdf/' + ${orden.idOrden}}"
               class="btn btn-success">

                Descargar PDF

            </a>

        </div>

    </div>

</div>

</body>
</html>

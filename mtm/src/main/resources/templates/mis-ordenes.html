<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mis Compras</title>

    <link rel="stylesheet" href="/libs/bootstrap/css/bootstrap.min.css">

    <style>

        body {
            background: #f5f5f5;
        }

        .box {

            background: white;
            padding: 30px;
            border-radius: 12px;

            box-shadow: 0 5px 20px rgba(0,0,0,0.08);

            margin-top: 40px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="box">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Mis Compras</h2>

            <a href="/"
               class="btn btn-dark">

                Volver a tienda

            </a>

        </div>

        <table class="table table-hover">

            <thead>
            <tr>
                <th>Compra</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Total</th>
                <th></th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="o : ${ordenes}">

                <td>
                    Compra realizada
                </td>

                <td>
                    <span th:text="${#dates.format(o.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></span>
                </td>

                <td>

                    <span class="badge bg-success"
                          th:text="${o.estado}"></span>

                </td>

                <td>

                    $<span th:text="${o.total}"></span>

                </td>

                <td>

                    <a th:href="@{'/orden/' + ${o.idOrden}}"
                       class="btn btn-outline-dark btn-sm">

                        Ver comprobante

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
